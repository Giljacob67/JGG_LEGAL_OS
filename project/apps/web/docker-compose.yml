version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: jgg-legal-os-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: jgg
      POSTGRES_PASSWORD: jgg_secret
      POSTGRES_DB: jgg_legal_os
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jgg -d jgg_legal_os"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jgg-legal-os-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jgg-legal-os-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://jgg:jgg_secret@db:5432/jgg_legal_os?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npx prisma migrate dev && npx prisma db seed && npm run dev"

volumes:
  pgdata:
  redisdata:
